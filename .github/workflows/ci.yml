name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cdek-sre .

      - name: Run container
        run: docker run -d --name cdek-sre -p 8000:8000 cdek-sre

      - name: Wait for service to start
        run: sleep 3

      - name: Check GET / returns OK
        run: |
          RESPONSE=$(curl -s http://localhost:8000/)
          echo "Response: $RESPONSE"
          [ "$RESPONSE" = "OK" ] || exit 1

      - name: Check GET /metrics contains required metrics
        run: |
          RESPONSE=$(curl -s http://localhost:8000/metrics)
          echo "Response:"
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q "http_requests_total" || exit 1
          echo "$RESPONSE" | grep -q "http_errors_total" || exit 1

      - name: Stop container
        if: always()
        run: docker stop cdek-sre && docker rm cdek-sre
